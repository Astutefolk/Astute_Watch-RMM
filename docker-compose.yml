version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: datto-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-datto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-datto_rmm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datto-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: datto-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datto-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datto-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-datto}:${DB_PASSWORD:-change_me_in_production}@postgres:5432/${DB_NAME:-datto_rmm}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_to_secure_random_key}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change_me_to_secure_random_key}
      API_PORT: 3000
      API_HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://frontend:3001}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      AGENT_HEARTBEAT_INTERVAL: 30000
      AGENT_OFFLINE_THRESHOLD: 120000
      ALERT_CPU_THRESHOLD: 85
      ALERT_RAM_THRESHOLD: 90
      ALERT_DISK_THRESHOLD: 95
      BCRYPT_ROUNDS: 10
      API_KEY_LENGTH: 32
    ports:
      - "3000:3000"
    networks:
      - datto-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: datto-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    networks:
      - datto-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: datto-nginx
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - datto-network
    profiles:
      - production

networks:
  datto-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
